<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>React Native — Master Reference</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f5f8;--bg2:#fff;--bg3:#eeeef3;--bg4:#e4e4ec;--text:#1a1a2e;--text2:#5a5a72;--text3:#8a8a9e;--accent:#5a4fcf;--accent2:#7c6ff0;--al:#ededfa;--green:#0d9f6e;--gbg:#ecfdf5;--gbd:#a7f3d0;--orange:#d97706;--obg:#fffbeb;--obd:#fcd34d;--red:#dc2626;--rbg:#fef2f2;--rbd:#fca5a5;--blue:#2563eb;--bbg:#eff6ff;--bbd:#93c5fd;--cyan:#0891b2;--br:#e2e2ea;--br2:#ededf3;--radius:12px;--rsm:8px;--mono:'JetBrains Mono',monospace;--sans:'DM Sans',system-ui,sans-serif;--shsm:0 1px 3px rgba(0,0,0,.06);--shmd:0 4px 16px rgba(0,0,0,.08);--shlg:0 12px 40px rgba(0,0,0,.12)}
*{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth}body{font-family:var(--sans);background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased}::selection{background:var(--accent);color:#fff}::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--br);border-radius:3px}
.app{max-width:1360px;margin:0 auto;padding:1.5rem 1.5rem 4rem}
.hero{text-align:center;padding:2rem 0 1.2rem}.hero h1{font-size:1.7rem;font-weight:800;letter-spacing:-.03em}.hero h1 span{color:var(--accent)}.hero p{color:var(--text2);font-size:.85rem;margin-top:4px}
.stats{display:flex;justify-content:center;gap:1.5rem;padding:.8rem 0;margin-bottom:.5rem;flex-wrap:wrap}.stat-item{text-align:center}.stat-num{font-size:1.4rem;font-weight:700;font-family:var(--mono)}.sn-c{color:var(--green)}.sn-i{color:var(--orange)}.sn-a{color:var(--red)}.sn-l{color:var(--blue)}.stat-label{font-size:.58rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);font-weight:600}
.controls{display:flex;gap:.6rem;margin-bottom:1.5rem;flex-wrap:wrap;align-items:center}.search-box{flex:1;min-width:200px;position:relative}.search-box input{width:100%;padding:9px 14px 9px 38px;font-size:.82rem;background:var(--bg2);border:1px solid var(--br);border-radius:var(--radius);color:var(--text);font-family:var(--sans);outline:none;transition:border .2s;box-shadow:var(--shsm)}.search-box input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--al)}.search-box svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--text3)}.filters{display:flex;gap:5px;flex-wrap:wrap}
.fbtn{padding:5px 14px;font-size:.72rem;border-radius:20px;border:1px solid var(--br);background:var(--bg2);color:var(--text2);cursor:pointer;transition:all .15s;font-family:var(--sans);font-weight:600}.fbtn:hover{border-color:var(--text3)}.fbtn.active{background:var(--accent);border-color:var(--accent);color:#fff}.fbtn[data-f="core"].active{background:var(--green);border-color:var(--green)}.fbtn[data-f="important"].active{background:var(--orange);border-color:var(--orange)}.fbtn[data-f="advanced"].active{background:var(--red);border-color:var(--red)}.fbtn[data-f="library"].active{background:var(--blue);border-color:var(--blue)}
.section{margin-bottom:2rem;animation:fu .35s ease both}@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}.sec-head{display:flex;align-items:center;gap:8px;padding-bottom:.6rem;border-bottom:1px solid var(--br2);margin-bottom:.75rem}.sec-icon{font-size:1.1rem}.sec-title{font-size:.92rem;font-weight:700}.sec-sub{font-size:.7rem;color:var(--text3)}.sec-count{margin-left:auto;font-size:.65rem;color:var(--text3);font-family:var(--mono);background:var(--bg3);padding:2px 8px;border-radius:10px}.group-label{font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);font-weight:700;margin:1rem 0 .4rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:6px}.card{background:var(--bg2);border:1px solid var(--br2);border-radius:var(--rsm);padding:12px 14px;cursor:pointer;transition:all .15s;box-shadow:var(--shsm)}.card:hover{border-color:var(--accent);box-shadow:0 2px 12px rgba(90,79,207,.12);transform:translateY(-1px)}.card.hidden{display:none}.card-top{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:4px}.card-name{font-family:var(--mono);font-size:.78rem;font-weight:600}.badge{font-size:.58rem;padding:2px 8px;border-radius:10px;font-weight:700;text-transform:uppercase;letter-spacing:.03em}.badge-core{background:var(--gbg);color:var(--green);border:1px solid var(--gbd)}.badge-important{background:var(--obg);color:var(--orange);border:1px solid var(--obd)}.badge-advanced{background:var(--rbg);color:var(--red);border:1px solid var(--rbd)}.badge-library{background:var(--bbg);color:var(--blue);border:1px solid var(--bbd)}.card-desc{font-size:.7rem;color:var(--text2);line-height:1.5}
.overlay{display:none;position:fixed;inset:0;z-index:1000}.overlay.open{display:flex}.overlay-bg{position:absolute;inset:0;background:rgba(0,0,0,.3);backdrop-filter:blur(4px)}.detail-modal{position:relative;margin:auto;width:94%;max-width:880px;max-height:92vh;background:var(--bg2);border:1px solid var(--br);border-radius:16px;overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--shlg)}.detail-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:1.25rem 1.5rem 1rem;border-bottom:1px solid var(--br2);flex-shrink:0}.detail-head-left h2{font-family:var(--mono);font-size:1.15rem;font-weight:700}.detail-head-left p{font-size:.76rem;color:var(--text2);margin-top:2px}.close-btn{width:30px;height:30px;border-radius:8px;border:1px solid var(--br);background:var(--bg);color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0;transition:all .15s}.close-btn:hover{background:var(--bg3);color:var(--text)}.detail-body{overflow-y:auto;padding:1.25rem 1.5rem 2rem;flex:1}
.d-section{margin-bottom:1.5rem}.d-section-title{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:.5rem;display:flex;align-items:center;gap:6px}.d-section-title::after{content:'';flex:1;height:1px;background:var(--br2)}
.info-row{display:flex;gap:.75rem;flex-wrap:wrap}.info-box{flex:1;min-width:180px;background:var(--bg);border:1px solid var(--br2);border-radius:var(--rsm);padding:12px 14px}.info-box h4{font-size:.6rem;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:5px;font-weight:700}.info-box p{font-size:.78rem;line-height:1.65}.gotcha-box{background:var(--obg);border:1px solid var(--obd);border-radius:var(--rsm);padding:10px 14px}.gotcha-box p{font-size:.78rem;color:#92400e;line-height:1.6}
.props-wrap{overflow-x:auto;border:1px solid var(--br2);border-radius:var(--rsm)}.props-table{width:100%;border-collapse:collapse;font-size:.72rem}.props-table th{text-align:left;padding:7px 10px;font-size:.6rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);border-bottom:1px solid var(--br);font-weight:700;background:var(--bg);position:sticky;top:0}.props-table td{padding:8px 10px;border-bottom:1px solid var(--br2);vertical-align:top}.props-table tr:hover td{background:var(--bg)}.prop-name{font-family:var(--mono);font-weight:600;color:var(--accent);font-size:.7rem;white-space:nowrap}.prop-type{font-family:var(--mono);color:var(--cyan);font-size:.65rem}.prop-default{font-family:var(--mono);color:var(--text3);font-size:.65rem}.prop-req{color:var(--red);font-size:.6rem;font-weight:800}.prop-opt{color:var(--text3);font-size:.6rem}.prop-desc{color:var(--text2);line-height:1.5}
.state-panel{background:var(--bg);border:1px solid var(--br2);border-radius:var(--rsm);padding:12px 14px}.state-row{display:flex;align-items:baseline;gap:8px;margin-bottom:5px;font-size:.73rem}.state-key{font-family:var(--mono);color:var(--accent);font-weight:600;min-width:90px;flex-shrink:0}.state-val{color:var(--text2)}
.code-block{background:#1e1e2e;border-radius:var(--rsm);padding:14px 16px;font-family:var(--mono);font-size:.7rem;line-height:1.8;color:#cdd6f4;white-space:pre-wrap;overflow-x:auto;position:relative}.copy-btn{position:absolute;top:8px;right:8px;padding:3px 10px;font-size:.6rem;background:#313244;border:1px solid #45475a;border-radius:6px;color:#bac2de;cursor:pointer;font-family:var(--mono);transition:all .15s}.copy-btn:hover{background:#45475a;color:#cdd6f4}
.demo-area{background:var(--bg);border:1px solid var(--br2);border-radius:var(--radius);overflow:hidden}.demo-toolbar{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;border-bottom:1px solid var(--br2);background:var(--bg3)}.demo-toolbar span{font-size:.65rem;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.05em}.demo-toolbar .reset-btn{padding:3px 10px;font-size:.6rem;border-radius:6px;border:1px solid var(--br);background:var(--bg2);color:var(--text3);cursor:pointer;font-family:var(--sans);transition:all .15s}.demo-toolbar .reset-btn:hover{border-color:var(--accent);color:var(--accent)}
.demo-phone{width:260px;min-height:400px;margin:20px auto;background:#f8f8fb;border-radius:28px;border:2px solid var(--br);overflow:hidden;position:relative;box-shadow:var(--shmd)}.demo-phone .phone-notch{width:90px;height:20px;background:#e4e4ec;border-radius:0 0 12px 12px;margin:0 auto}.demo-phone .phone-screen{padding:10px;min-height:340px;display:flex;flex-direction:column}.demo-phone .phone-home{width:90px;height:4px;background:#c0c0cc;border-radius:2px;margin:6px auto 5px}
.demo-controls{padding:12px;display:flex;flex-wrap:wrap;gap:6px;justify-content:center}.demo-ctrl-btn{padding:5px 12px;font-size:.68rem;border-radius:8px;border:1px solid var(--br);background:var(--bg2);color:var(--text2);cursor:pointer;font-family:var(--sans);font-weight:600;transition:all .15s;box-shadow:var(--shsm)}.demo-ctrl-btn:hover{border-color:var(--accent);color:var(--accent)}
.ph-view{background:var(--al);border:1.5px dashed #b4b0e8;border-radius:8px;padding:10px;margin-bottom:6px}.ph-btn{padding:10px 0;text-align:center;background:var(--accent);color:#fff;border-radius:10px;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .15s}.ph-btn:active{opacity:.7;transform:scale(.97)}.ph-input{width:100%;padding:9px 12px;background:#fff;border:1.5px solid var(--br);border-radius:10px;color:var(--text);font-size:.78rem;outline:none;font-family:var(--sans)}.ph-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--al)}.ph-scroll{max-height:200px;overflow-y:auto;border:1px solid var(--br2);border-radius:8px;background:#fff}.ph-list-item{padding:9px 12px;border-bottom:1px solid var(--br2);font-size:.72rem;color:var(--text2);display:flex;justify-content:space-between}.ph-list-item:last-child{border-bottom:none}.ph-spinner{width:22px;height:22px;border:2.5px solid var(--br);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:16px auto}@keyframes spin{to{transform:rotate(360deg)}}.ph-tab-bar{display:flex;border-top:1px solid var(--br2);margin-top:auto;background:#fff}.ph-tab{flex:1;padding:7px 0;text-align:center;font-size:.58rem;color:var(--text3);cursor:pointer;transition:color .15s}.ph-tab.active{color:var(--accent)}
@media(max-width:768px){.app{padding:1rem}.hero h1{font-size:1.3rem}.grid{grid-template-columns:1fr}.detail-modal{width:100%;max-height:100vh;border-radius:12px 12px 0 0;margin:auto 0 0 0}.info-row{flex-direction:column}.demo-phone{width:240px;min-height:370px}}
</style>
</head>
<body>
<div class="app">
  <div class="hero"><h1>React Native — <span>Master Reference</span></h1><p>Semua komponen, API & library. Lengkap dengan props, state, dan interactive demo.</p></div>
  <div class="stats" id="stats"></div>
  <div class="controls"><div class="search-box"><svg viewBox="0 0 16 16" fill="none"><circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.3"/><line x1="10.5" y1="10.5" x2="14" y2="14" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg><input type="text" id="searchInput" placeholder="Cari komponen, API, props..." oninput="applyFilters()"></div><div class="filters" id="filterBar"></div></div>
  <div id="sectionsRoot"></div>
</div>
<div class="overlay" id="overlay"><div class="overlay-bg" onclick="closeDetail()"></div><div class="detail-modal"><div class="detail-head"><div class="detail-head-left"><h2 id="dName"></h2><p id="dDesc"></p></div><button class="close-btn" onclick="closeDetail()">✕</button></div><div class="detail-body" id="dBody"></div></div></div>
<script>
const DATA = { sections: [
// ──────────────────── SECTION 1: CORE UI ────────────────────
{
  id:"core-ui", icon:"🧩", title:"Core UI Components", sub:"Official React Native",
  groups:[
    { label:"Fundamental", items:[
// ---- VIEW ----
{ name:"View", badge:"core", desc:"Container utama untuk layout — setara div di web",
  detail:{
    use:"Semua layout. Ini container paling dasar di React Native. Setiap screen dimulai dari View.",
    gotcha:"View tidak punya scroll bawaan. Kalau konten bisa overflow, wrap dengan ScrollView. View juga tidak bisa menampilkan teks langsung — harus pakai <Text>.",
    props:[
      {n:"style",t:"ViewStyle | ViewStyle[]",d:"-",r:false,ds:"Styling menggunakan Flexbox. Bisa array untuk merge styles."},
      {n:"onLayout",t:"(event: LayoutEvent) => void",d:"-",r:false,ds:"Dipanggil saat layout berubah. Event berisi {x, y, width, height}."},
      {n:"accessible",t:"boolean",d:"true",r:false,ds:"Apakah view ini adalah accessibility element."},
      {n:"accessibilityLabel",t:"string",d:"-",r:false,ds:"Label yang dibaca screen reader."},
      {n:"accessibilityRole",t:"AccessibilityRole",d:"-",r:false,ds:"Role untuk screen reader: 'button', 'header', 'image', dll."},
      {n:"accessibilityState",t:"object",d:"-",r:false,ds:"State accessibility: {disabled, selected, checked, busy, expanded}."},
      {n:"testID",t:"string",d:"-",r:false,ds:"ID untuk testing (Detox, Appium)."},
      {n:"pointerEvents",t:"'box-none'|'none'|'box-only'|'auto'",d:"'auto'",r:false,ds:"Kontrol apakah view bisa menerima touch events."},
      {n:"collapsable",t:"boolean",d:"true",r:false,ds:"Android: view tanpa children/style bisa di-remove dari native hierarchy untuk optimasi."},
      {n:"nativeID",t:"string",d:"-",r:false,ds:"ID native untuk referensi dari native code."},
      {n:"needsOffscreenAlphaCompositing",t:"boolean",d:"false",r:false,ds:"Render view ke offscreen buffer dulu sebelum compositing. Berguna untuk animasi opacity."},
      {n:"hitSlop",t:"Insets | number",d:"-",r:false,ds:"Perbesar area touch tanpa mengubah layout."},
      {n:"removeClippedSubviews",t:"boolean",d:"false",r:false,ds:"Optimasi: unmount child views di luar viewport (eksperimental)."},
      {n:"onMoveShouldSetResponder",t:"(event) => boolean",d:"-",r:false,ds:"Gesture responder system — apakah view ingin menjadi responder saat move."},
    ],
    states:[
      {n:"layout",ds:"Ukuran dan posisi view setelah layout engine menghitung ({x, y, width, height})."},
    ],
    code:`import { View, Text, StyleSheet } from 'react-native';

const MyComponent = () => (
  <View style={styles.container}>
    <View style={styles.row}>
      <View style={styles.box}>
        <Text>Box 1</Text>
      </View>
      <View style={[styles.box, styles.boxAccent]}>
        <Text>Box 2</Text>
      </View>
    </View>
    <View
      onLayout={(e) => {
        const { width, height } = e.nativeEvent.layout;
        console.log('Layout:', width, height);
      }}
    >
      <Text>Measured View</Text>
    </View>
  </View>
);

const styles = StyleSheet.create({
  container: { flex: 1, padding: 16 },
  row: { flexDirection: 'row', gap: 12 },
  box: { flex: 1, padding: 20, backgroundColor: '#f0f0f0', borderRadius: 8 },
  boxAccent: { backgroundColor: '#e8f4ff' },
});`,
    demo: "view"
  }
},
// ---- TEXT ----
{ name:"Text", badge:"core", desc:"Render teks — satu-satunya cara menampilkan string",
  detail:{
    use:"SEMUA teks wajib pakai Text. Tidak bisa taruh string langsung di View — akan error.",
    gotcha:"Text nested MEWARISI style parent Text-nya (cascading), beda dengan View. Ini mirip inline element di web.",
    props:[
      {n:"style",t:"TextStyle | TextStyle[]",d:"-",r:false,ds:"Font size, weight, color, line height, text align, dll."},
      {n:"numberOfLines",t:"number",d:"-",r:false,ds:"Batasi jumlah baris. Text akan terpotong dan muncul ellipsis."},
      {n:"ellipsizeMode",t:"'head'|'middle'|'tail'|'clip'",d:"'tail'",r:false,ds:"Posisi ellipsis saat text terpotong."},
      {n:"selectable",t:"boolean",d:"false",r:false,ds:"User bisa select & copy text."},
      {n:"onPress",t:"() => void",d:"-",r:false,ds:"Handler saat text di-tap. Bikin Text bisa jadi link."},
      {n:"onLongPress",t:"() => void",d:"-",r:false,ds:"Handler saat text di-long press."},
      {n:"onTextLayout",t:"(event) => void",d:"-",r:false,ds:"Info layout tiap baris text (lines array)."},
      {n:"adjustsFontSizeToFit",t:"boolean",d:"false",r:false,ds:"iOS: auto-shrink font supaya muat di container."},
      {n:"minimumFontScale",t:"number",d:"-",r:false,ds:"iOS: minimum scale saat adjustsFontSizeToFit. Range 0-1."},
      {n:"allowFontScaling",t:"boolean",d:"true",r:false,ds:"Apakah font mengikuti system accessibility font size."},
      {n:"maxFontSizeMultiplier",t:"number",d:"-",r:false,ds:"Batas max font scaling. 0 = unlimited."},
      {n:"suppressHighlighting",t:"boolean",d:"false",r:false,ds:"iOS: suppress highlight saat text di-tap."},
      {n:"disabled",t:"boolean",d:"false",r:false,ds:"Disable text press events."},
      {n:"dataDetectorType",t:"'phoneNumber'|'link'|'email'|'all'|'none'",d:"'none'",r:false,ds:"Android: auto-detect phone, link, email."},
      {n:"lineBreakStrategyIOS",t:"'none'|'standard'|'hangul-word'|'push-out'",d:"'none'",r:false,ds:"iOS 14+: strategi line break."},
    ],
    states:[
      {n:"pressed",ds:"Apakah text sedang ditekan (saat onPress diset)."},
    ],
    code:`import { Text, StyleSheet } from 'react-native';

const TextExamples = () => (
  <>
    {/* Basic */}
    <Text style={styles.title}>Judul Halaman</Text>

    {/* Truncated */}
    <Text numberOfLines={2} ellipsizeMode="tail" style={styles.body}>
      Text yang sangat panjang akan terpotong setelah dua baris
      dan menampilkan ellipsis di akhir baris kedua...
    </Text>

    {/* Nested - style cascading */}
    <Text style={styles.body}>
      Ini text normal,{' '}
      <Text style={styles.bold}>ini bold yang mewarisi</Text>
      {' '}dan{' '}
      <Text style={styles.link} onPress={() => alert('Tapped!')}>
        ini bisa di-tap
      </Text>
    </Text>

    {/* Selectable */}
    <Text selectable>Long press untuk copy text ini</Text>
  </>
);

const styles = StyleSheet.create({
  title: { fontSize: 24, fontWeight: '700', marginBottom: 8 },
  body: { fontSize: 15, lineHeight: 22, color: '#333' },
  bold: { fontWeight: '700' },
  link: { color: '#007AFF', textDecorationLine: 'underline' },
});`,
    demo: "text"
  }
},
// ---- IMAGE ----
{ name:"Image", badge:"core", desc:"Render gambar lokal & remote",
  detail:{
    use:"Gambar produk, avatar, banner, icons bitmap. Bisa dari URI atau require() lokal.",
    gotcha:"Remote image WAJIB ada width & height explicit — tidak auto-size seperti web <img>. Tanpa dimensi = tidak muncul!",
    props:[
      {n:"source",t:"ImageSource",d:"-",r:true,ds:"Sumber gambar: { uri: 'https://...' } atau require('./img.png')."},
      {n:"style",t:"ImageStyle",d:"-",r:false,ds:"Width, height, borderRadius, tintColor, opacity, dll."},
      {n:"resizeMode",t:"'cover'|'contain'|'stretch'|'repeat'|'center'",d:"'cover'",r:false,ds:"Cara gambar di-resize ke container."},
      {n:"onLoad",t:"(event) => void",d:"-",r:false,ds:"Dipanggil saat gambar berhasil di-load."},
      {n:"onLoadStart",t:"() => void",d:"-",r:false,ds:"Dipanggil saat mulai loading."},
      {n:"onLoadEnd",t:"() => void",d:"-",r:false,ds:"Dipanggil saat loading selesai (sukses atau gagal)."},
      {n:"onError",t:"(event) => void",d:"-",r:false,ds:"Dipanggil saat gagal load gambar."},
      {n:"onProgress",t:"(event) => void",d:"-",r:false,ds:"iOS: progress download. event.nativeEvent.{loaded, total}."},
      {n:"blurRadius",t:"number",d:"-",r:false,ds:"Blur effect pada gambar. Angka makin besar makin blur."},
      {n:"loadingIndicatorSource",t:"ImageSource",d:"-",r:false,ds:"Gambar placeholder saat loading."},
      {n:"defaultSource",t:"ImageSource",d:"-",r:false,ds:"iOS: gambar default sebelum remote image di-load."},
      {n:"fadeDuration",t:"number",d:"300",r:false,ds:"Android: durasi fade-in animation (ms)."},
      {n:"progressiveRenderingEnabled",t:"boolean",d:"false",r:false,ds:"Android: progressive JPEG rendering."},
      {n:"accessible",t:"boolean",d:"true",r:false,ds:"Accessibility flag."},
      {n:"accessibilityLabel",t:"string",d:"-",r:false,ds:"Alt text untuk screen reader."},
      {n:"tintColor",t:"string",d:"-",r:false,ds:"Warna tint yang overlay gambar. Berguna untuk icons."},
      {n:"crossOrigin",t:"'anonymous'|'use-credentials'",d:"-",r:false,ds:"CORS mode untuk image request."},
    ],
    states:[
      {n:"loading",ds:"Apakah gambar sedang di-download/decode."},

  const [refreshing, setRefreshing] = useState(false);

    <View style={styles.row}>
      <Text style={styles.name}>{item.name}</Text>
      <Text style={styles.amount}>{item.amount}</Text>
    </View>
  ), []);

  const loadMore = () => {
    if (loading) return;
    setLoading(true);
    fetchNextPage().then(newItems => {
      setData(prev => [...prev, ...newItems]);
      setLoading(false);
    });
  };

  return (
    <FlatList
      data={data}
      renderItem={renderItem}
      keyExtractor={(item) => item.id}
      ListEmptyComponent={<EmptyState />}
      ListFooterComponent={loading ? <Spinner /> : null}
      onEndReached={loadMore}
      onEndReachedThreshold={0.5}

      onRefresh={async () => {

        const fresh = await fetchLatest();
        setData(fresh);
        setRefreshing(false);

      // Optimasi performa:
      removeClippedSubviews
      maxToRenderPerBatch={15}
      windowSize={10}
      initialNumToRender={10}

    code:`import { useEffect, useState } from 'react';
import { Keyboard, Platform } from 'react-native';

const useKeyboard = () => {
  const [keyboardHeight, setKeyboardHeight] = useState(0);
  const [isVisible, setIsVisible] = useState(false);

  useEffect(() => {
    const showEvent = Platform.OS === 'ios'
      ? 'keyboardWillShow'
      : 'keyboardDidShow';
    const hideEvent = Platform.OS === 'ios'
      ? 'keyboardWillHide'
      : 'keyboardDidHide';

    const showSub = Keyboard.addListener(showEvent, (e) => {
      setKeyboardHeight(e.endCoordinates.height);
      setIsVisible(true);
    });
    const hideSub = Keyboard.addListener(hideEvent, () => {
      setKeyboardHeight(0);
      setIsVisible(false);
    });

    return () => {
      showSub.remove();
      hideSub.remove();
    };
  }, []);

  return { keyboardHeight, isVisible };
};`,
    demo: "keyboard"
  }
},

const CardSwipe = () => {
  const translateX = useSharedValue(0);
  const scale = useSharedValue(1);

  const animatedStyle = useAnimatedStyle(() => ({
    transform: [
      { translateX: translateX.value },
      { scale: scale.value },
      { rotate: \`\${interpolate(
        translateX.value, [-200, 0, 200], [-15, 0, 15]
      )}deg\` },
    ],
    opacity: interpolate(
      Math.abs(translateX.value), [0, 200], [1, 0.5]
    ),
  }));

  const handlePress = () => {
    scale.value = withSequence(
      withTiming(0.95, { duration: 100 }),
      withSpring(1, { damping: 4 })
    );
  };

  return (
    <Animated.View style={[styles.card, animatedStyle]}>
      <Pressable onPress={handlePress}>
        <Text>Swipe me!</Text>
      </Pressable>
    </Animated.View>
  );
};`,

import Animated, {
  useSharedValue, useAnimatedStyle, withSpring
} from 'react-native-reanimated';

const SwipeableCard = () => {
  const translateX = useSharedValue(0);
  const translateY = useSharedValue(0);

  const pan = Gesture.Pan()
    .onUpdate((e) => {
      translateX.value = e.translationX;
      translateY.value = e.translationY;
    })
    .onEnd(() => {
      translateX.value = withSpring(0);
      translateY.value = withSpring(0);
    });

  const doubleTap = Gesture.Tap()
    .numberOfTaps(2)
    .onEnd(() => {
      // Double tap action
    });

  // Combine gestures
  const combined = Gesture.Simultaneous(pan, doubleTap);

  const style = useAnimatedStyle(() => ({
    transform: [
      { translateX: translateX.value },
      { translateY: translateY.value },
    ],
  }));

  return (
    <GestureDetector gesture={combined}>
      <Animated.View style={[styles.card, style]}>
        <Text>Drag me!</Text>
      </Animated.View>
    </GestureDetector>
  );
};

// ===================== RENDER ENGINE =====================


let activeFilter='all';
const BL={core:'Core',important:'Penting',advanced:'Advanced',library:'Library'};
function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function init(){renderFilters();renderSections();updateStats();}
function renderFilters(){
  const bar=document.getElementById('filterBar');
  ['all','core','important','advanced','library'].forEach(f=>{
    const b=document.createElement('button');b.className='fbtn'+(f==='all'?' active':'');b.dataset.f=f;
    b.textContent=f==='all'?'Semua':BL[f]||f;
    b.onclick=()=>{activeFilter=f;document.querySelectorAll('.fbtn').forEach(x=>x.classList.toggle('active',x.dataset.f===f));applyFilters();};
    bar.appendChild(b);
  });
}
function renderSections(){
  const root=document.getElementById('sectionsRoot');root.innerHTML='';
  DATA.sections.forEach(sec=>{
    const tot=sec.groups.reduce((a,g)=>a+g.items.length,0);
    let h=`<div class="section" id="sec-${sec.id}"><div class="sec-head"><span class="sec-icon">${sec.icon}</span><span class="sec-title">${sec.title}</span><span class="sec-sub">${sec.sub}</span><span class="sec-count">${tot}</span></div>`;
    sec.groups.forEach(g=>{
      h+=`<div class="sub-group">`;
      if(g.label)h+=`<div class="group-label">${g.label}</div>`;
      h+=`<div class="grid">`;
      g.items.forEach(item=>{
        const en=escapeHtml(item.name),ed=escapeHtml(item.desc);
        h+=`<div class="card" data-name="${en}" data-badge="${item.badge}" data-desc="${ed}" onclick='openDetail(${JSON.stringify(item.name)})'><div class="card-top"><span class="card-name">${en}</span><span class="badge badge-${item.badge}">${BL[item.badge]||item.badge}</span></div><div class="card-desc">${ed}</div></div>`;
      });
      h+=`</div></div>`;
    });
    h+=`</div>`;
    root.insertAdjacentHTML('beforeend',h);
  });
}
function updateStats(){
  const vis=document.querySelectorAll('.card:not(.hidden)');
  let c={t:vis.length,core:0,imp:0,adv:0,lib:0};
  vis.forEach(x=>{const b=x.dataset.badge;if(b==='core')c.core++;else if(b==='important')c.imp++;else if(b==='advanced')c.adv++;else if(b==='library')c.lib++;});
  document.getElementById('stats').innerHTML=`
    <div class="stat-item"><div class="stat-num">${c.t}</div><div class="stat-label">Total</div></div>
    <div class="stat-item"><div class="stat-num sn-c">${c.core}</div><div class="stat-label">Core</div></div>
    <div class="stat-item"><div class="stat-num sn-i">${c.imp}</div><div class="stat-label">Important</div></div>
    <div class="stat-item"><div class="stat-num sn-a">${c.adv}</div><div class="stat-label">Advanced</div></div>
    <div class="stat-item"><div class="stat-num sn-l">${c.lib}</div><div class="stat-label">Library</div></div>`;
}
function applyFilters(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  document.querySelectorAll('.card').forEach(c=>{
    const ms=!q||c.dataset.name.toLowerCase().includes(q)||c.dataset.desc.toLowerCase().includes(q);
    const mf=activeFilter==='all'||c.dataset.badge===activeFilter;
    c.classList.toggle('hidden',!(ms&&mf));
  });
  document.querySelectorAll('.section').forEach(s=>s.style.display=s.querySelectorAll('.card:not(.hidden)').length?'':'none');
  document.querySelectorAll('.sub-group').forEach(s=>s.style.display=s.querySelectorAll('.card:not(.hidden)').length?'':'none');
  updateStats();
}

// ===== DETAIL (SINGLE SCROLL — NO TABS) =====
function findItem(n){for(const s of DATA.sections)for(const g of s.groups)for(const i of g.items)if(i.name===n)return i;return null;}

function openDetail(name){
  const item=findItem(name);if(!item)return;
  const d=item.detail;
  document.getElementById('dName').textContent=item.name;
  document.getElementById('dDesc').textContent=item.desc;
  const body=document.getElementById('dBody');
  let h='';

  // 1) OVERVIEW
  h+=`<div class="d-section"><div class="d-section-title">Overview</div>
    <div class="info-row">
      <div class="info-box"><h4>Kapan Dipake</h4><p>${d.use||''}</p></div>
      <div class="info-box"><h4>Level</h4><p><span class="badge badge-${item.badge}" style="font-size:.7rem;padding:3px 10px">${BL[item.badge]}</span></p></div>
    </div>
    ${d.gotcha?`<div class="gotcha-box" style="margin-top:.75rem"><p>⚠️ ${d.gotcha}</p></div>`:''}
  </div>`;

  // 2) PROPS TABLE
  if(d.props&&d.props.length){
    h+=`<div class="d-section"><div class="d-section-title">Props / Parameters</div>
      <div class="props-wrap"><table class="props-table"><thead><tr><th>Prop</th><th>Type</th><th>Default</th><th>Req</th><th>Deskripsi</th></tr></thead><tbody>`;
    d.props.forEach(p=>{
      if(typeof p==='string'){h+=`<tr><td class="prop-name">${escapeHtml(p)}</td><td>-</td><td>-</td><td>-</td><td>-</td></tr>`;}
      else{h+=`<tr><td class="prop-name">${escapeHtml(p.n)}</td><td class="prop-type">${escapeHtml(p.t||'-')}</td><td class="prop-default">${escapeHtml(p.d||'-')}</td><td>${p.r?'<span class="prop-req">YES</span>':'<span class="prop-opt">no</span>'}</td><td class="prop-desc">${escapeHtml(p.ds||'-')}</td></tr>`;}
    });
    h+=`</tbody></table></div></div>`;
  }

  // 3) STATE
  if(d.states&&d.states.length){
    h+=`<div class="d-section"><div class="d-section-title">State yang Biasa Dipakai</div><div class="state-panel">`;
    d.states.forEach(s=>{h+=`<div class="state-row"><span class="state-key">${escapeHtml(s.n)}</span><span class="state-val">${escapeHtml(s.ds)}</span></div>`;});
    h+=`</div></div>`;
  }

  // 4) CODE
  if(d.code){
    h+=`<div class="d-section"><div class="d-section-title">Contoh Penggunaan</div>
      <div class="code-block"><button class="copy-btn" onclick="copyCode(this)">Copy</button>${escapeHtml(d.code)}</div></div>`;
  }

  // 5) DEMO
  h+=`<div class="d-section"><div class="d-section-title">Interactive Demo</div>${buildDemo(item)}</div>`;

  body.innerHTML=h;
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
  initDemo(item);
}

function closeDetail(){document.getElementById('overlay').classList.remove('open');document.body.style.overflow='';}
function copyCode(btn){const code=btn.parentElement.textContent.replace('Copy','').trim();navigator.clipboard?.writeText(code);btn.textContent='Copied!';setTimeout(()=>btn.textContent='Copy',1500);}

    flexbox:()=>{
      scr.innerHTML=`<div id="dfb" style="display:flex;flex-direction:column;gap:6px;transition:all .3s"><div style="height:36px;background:${K.a};border-radius:6px;display:flex;align-items:center;justify-content:center"><span style="font-size:.6rem;color:#fff">flex: 1</span></div><div style="height:36px;background:${K.g};border-radius:6px;display:flex;align-items:center;justify-content:center"><span style="font-size:.6rem;color:#fff">flex: 2</span></div><div style="height:36px;background:${K.o};border-radius:6px;display:flex;align-items:center;justify-content:center"><span style="font-size:.6rem;color:#fff">flex: 1</span></div></div><div style="font-size:.55rem;color:${K.t3};margin-top:8px;text-align:center" id="dfb-i">flexDirection: column (RN default)</div>`;
      ctrl.innerHTML=`<button class="demo-ctrl-btn" onclick="var c=document.getElementById('dfb');var d=c.style.flexDirection==='row'?'column':'row';c.style.flexDirection=d;document.getElementById('dfb-i').textContent='flexDirection: '+d">Direction</button><button class="demo-ctrl-btn" onclick="var c=document.getElementById('dfb');var j=['flex-start','center','flex-end','space-between','space-around','space-evenly'];window._ji=(window._ji||0)+1;var v=j[window._ji%j.length];c.style.justifyContent=v;document.getElementById('dfb-i').textContent='justify: '+v">Justify</button>`;
    },
    stacknav:()=>{
      scr.innerHTML=`<div id="sn-h"><div style="font-size:.95rem;font-weight:700;margin-bottom:8px">🏠 Home</div><div style="padding:10px;background:#fff;border-radius:8px;border:1px solid ${K.br};cursor:pointer;margin-bottom:5px" onclick="snPush('d')"><div style="font-size:.75rem">Product A →</div></div><div style="padding:10px;background:#fff;border-radius:8px;border:1px solid ${K.br};cursor:pointer" onclick="snPush('d')"><div style="font-size:.75rem">Product B →</div></div></div><div id="sn-d" style="display:none"><div style="color:${K.a};font-size:.75rem;cursor:pointer;margin-bottom:10px" onclick="snPop()">← Back</div><div style="font-size:.95rem;font-weight:700;margin-bottom:6px">📦 Detail</div><div style="font-size:.7rem;color:${K.t3}">route.params: { id }</div><div style="padding:10px;background:#fff;border-radius:8px;border:1px solid ${K.br};cursor:pointer;margin-top:8px" onclick="snPush('s')"><div style="font-size:.72rem">⚙️ Settings →</div></div></div><div id="sn-s" style="display:none"><div style="color:${K.a};font-size:.75rem;cursor:pointer;margin-bottom:10px" onclick="snPop()">← Back</div><div style="font-size:.95rem;font-weight:700">⚙️ Settings</div><div style="font-size:.6rem;color:${K.t3};margin-top:4px">Stack depth: 3</div></div><div style="font-size:.5rem;color:${K.t3};margin-top:8px;text-align:center" id="sn-inf">Stack: [Home]</div>`;
      window._sn=['h'];
    },
    tabnav:()=>{
      scr.innerHTML=`<div style="flex:1;display:flex;flex-direction:column"><div style="flex:1;display:flex;align-items:center;justify-content:center" id="tn-c"><div style="text-align:center"><div style="font-size:1.5rem">🏠</div><div style="font-size:.78rem;font-weight:600">Home</div></div></div><div class="ph-tab-bar" id="tn-tb"><div class="ph-tab active" onclick="swTab(0)">🏠<br>Home</div><div class="ph-tab" onclick="swTab(1)">🔍<br>Search</div><div class="ph-tab" onclick="swTab(2)" style="position:relative">🛒<br>Cart<span style="position:absolute;top:1px;right:22%;background:${K.r};color:#fff;font-size:.5rem;width:14px;height:14px;border-radius:7px;display:flex;align-items:center;justify-content:center">3</span></div><div class="ph-tab" onclick="swTab(3)">👤<br>Profile</div></div></div>`;
    },
    reanimated:()=>{
      scr.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;gap:14px;padding-top:16px"><div id="ra-b" style="width:70px;height:70px;background:${K.a};border-radius:12px;transition:all .3s cubic-bezier(.68,-.55,.27,1.55);display:flex;align-items:center;justify-content:center;cursor:pointer" onclick="raAn()"><span style="font-size:1.3rem">🎯</span></div><div style="font-size:.58rem;color:${K.t3}" id="ra-i">Tap or use controls</div><div style="width:100%;height:4px;background:${K.br};border-radius:2px;overflow:hidden;margin-top:8px"><div id="ra-p" style="width:0%;height:100%;background:${K.a2};border-radius:2px;transition:width .5s"></div></div></div>`;
      ctrl.innerHTML=`<button class="demo-ctrl-btn" onclick="var b=document.getElementById('ra-b');b.style.transition='all .5s cubic-bezier(.68,-.55,.27,1.55)';b.style.transform='translateY(-35px) scale(1.1)';setTimeout(()=>b.style.transform='',600);document.getElementById('ra-i').textContent='withSpring'">Spring</button><button class="demo-ctrl-btn" onclick="var b=document.getElementById('ra-b');b.style.transition='all .4s ease-in-out';b.style.transform='translateX(55px)';setTimeout(()=>b.style.transform='',500);document.getElementById('ra-i').textContent='withTiming'">Timing</button><button class="demo-ctrl-btn" onclick="var b=document.getElementById('ra-b');b.style.transition='all .2s';b.style.transform='scale(.8)';setTimeout(()=>{b.style.transform='scale(1.3)'},200);setTimeout(()=>{b.style.transition='all .4s cubic-bezier(.68,-.55,.27,1.55)';b.style.transform=''},400);document.getElementById('ra-i').textContent='withSequence'">Sequence</button><button class="demo-ctrl-btn" onclick="document.getElementById('ra-b').style.transform='';document.getElementById('ra-i').textContent='Reset';document.getElementById('ra-p').style.width='0%'">Reset</button>`;
    },
    gesturehandler:()=>{
      scr.innerHTML=`<div style="height:280px;position:relative;border:1.5px dashed ${K.br};border-radius:12px;overflow:hidden" id="gh-a"><div id="gh-b" style="width:56px;height:56px;background:${K.g};border-radius:12px;position:absolute;top:110px;left:82px;cursor:grab;display:flex;align-items:center;justify-content:center;user-select:none;touch-action:none;transition:box-shadow .15s"><span style="font-size:1.1rem;pointer-events:none">✋</span></div><div style="position:absolute;bottom:6px;left:50%;transform:translateX(-50%);font-size:.55rem;color:${K.t3}" id="gh-i">Drag the box!</div></div>`;
      setTimeout(initDrag,100);

  const genericDemo=()=>{scr.innerHTML=`<div style="flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;padding:20px"><div style="font-size:1.8rem">📱</div><div style="font-size:.75rem;font-weight:600">${item?.name||'Component'}</div><div style="font-size:.62rem;color:${K.t3};text-align:center">Lihat code di atas</div></div>`;};
  (demos[d]||genericDemo)();

// ===== Demo Helpers =====
window.setTL=function(n){var b=document.getElementById('dt-b');if(!b)return;b.style.overflow=n>0?'hidden':'';b.style.display=n>0?'-webkit-box':'';b.style.webkitLineClamp=n>0?n:'';b.style.webkitBoxOrient='vertical';document.getElementById('dt-i').textContent='numberOfLines: '+(n||'unlimited');};
window.upIS=function(){var e=document.getElementById('di-e')?.value||'',p=document.getElementById('di-p')?.value||'',ph=document.getElementById('di-ph')?.value||'';document.getElementById('di-s').textContent='{ email:"'+e+'", pass:"'+'\u2022'.repeat(p.length)+'", phone:"'+ph+'" }';};
window.showAl=function(t){var o=document.getElementById('dal-o'),b=document.getElementById('dal-b');o.style.display='flex';var cl="document.getElementById('dal-o').style.display='none'";if(t==='s')b.innerHTML='<div style="font-size:.82rem;font-weight:600;margin-bottom:5px">Berhasil</div><div style="font-size:.68rem;color:#5a5a72;margin-bottom:12px">Data tersimpan!</div><div style="color:#5a4fcf;font-size:.78rem;font-weight:600;cursor:pointer" onclick="'+cl+'">OK</div>';else if(t==='c')b.innerHTML='<div style="font-size:.82rem;font-weight:600;margin-bottom:5px">Simpan?</div><div style="font-size:.68rem;color:#5a5a72;margin-bottom:12px">Perubahan belum disimpan.</div><div style="display:flex;justify-content:center;gap:14px"><span style="color:#8a8a9e;cursor:pointer" onclick="'+cl+'">Batal</span><span style="color:#5a4fcf;font-weight:600;cursor:pointer" onclick="'+cl+'">Simpan</span></div>';else b.innerHTML='<div style="font-size:.82rem;font-weight:600;margin-bottom:5px">Hapus?</div><div style="font-size:.68rem;color:#5a5a72;margin-bottom:12px">Tidak bisa dibatalkan.</div><div style="display:flex;justify-content:center;gap:14px"><span style="color:#8a8a9e;cursor:pointer" onclick="'+cl+'">Batal</span><span style="color:#dc2626;font-weight:600;cursor:pointer" onclick="'+cl+'">Hapus</span></div>';};
window.flMore=function(){var l=document.getElementById('dfl-ld'),list=document.getElementById('dfl');if(!l||!list)return;l.style.display='block';list.scrollTop=list.scrollHeight;setTimeout(()=>{l.style.display='none';var ct=list.querySelectorAll('.ph-list-item').length;for(var i=1;i<=5;i++){var d=document.createElement('div');d.className='ph-list-item';d.innerHTML='<span>Item '+(ct+i)+'</span><span style="color:#5a4fcf">Rp '+(Math.random()*1e6|0).toLocaleString()+'</span>';list.insertBefore(d,l);}document.getElementById('dfl-i').textContent=(ct+5)+' items';},800);};
window.snPush=function(n){window._sn.push(n);snU();};
window.snPop=function(){if(window._sn.length>1)window._sn.pop();snU();};
function snU(){var c=window._sn[window._sn.length-1];['h','d','s'].forEach(s=>{var e=document.getElementById('sn-'+s);if(e)e.style.display=s===c?'block':'none';});document.getElementById('sn-inf').textContent='Stack: ['+window._sn.join(' \u2192 ')+']';}
window.swTab=function(i){var tabs=document.getElementById('tn-tb').children,c=document.getElementById('tn-c');var s=[{i:'\ud83c\udfe0',l:'Home'},{i:'\ud83d\udd0d',l:'Search'},{i:'\ud83d\uded2',l:'Cart'},{i:'\ud83d\udc64',l:'Profile'}];for(var j=0;j<tabs.length;j++)tabs[j].classList.toggle('active',j===i);c.innerHTML='<div style="text-align:center"><div style="font-size:1.5rem">'+s[i].i+'</div><div style="font-size:.78rem;font-weight:600">'+s[i].l+'</div></div>';};
window.raAn=function(){var b=document.getElementById('ra-b');b.style.transform='scale(1.3) rotate(15deg)';setTimeout(()=>b.style.transform='',400);document.getElementById('ra-p').style.width='100%';setTimeout(()=>document.getElementById('ra-p').style.width='0%',1500);};

function initDrag(){
  var box=document.getElementById('gh-b'),area=document.getElementById('gh-a');
  if(!box||!area)return;var dr=false,sx,sy,ox,oy;
  function md(e){dr=true;sx=e.clientX||(e.touches&&e.touches[0].clientX);sy=e.clientY||(e.touches&&e.touches[0].clientY);ox=box.offsetLeft;oy=box.offsetTop;box.style.cursor='grabbing';box.style.boxShadow='0 6px 20px #0003';e.preventDefault();}
  function mm(e){if(!dr)return;var cx=e.clientX||(e.touches&&e.touches[0].clientX),cy=e.clientY||(e.touches&&e.touches[0].clientY);box.style.left=Math.max(0,Math.min(area.clientWidth-56,ox+(cx-sx)))+'px';box.style.top=Math.max(0,Math.min(area.clientHeight-56,oy+(cy-sy)))+'px';}
  function mu(){if(!dr)return;dr=false;box.style.cursor='grab';box.style.boxShadow='';document.getElementById('gh-i').textContent='{x:'+parseInt(box.style.left)+', y:'+parseInt(box.style.top)+'}';}
  box.addEventListener('mousedown',md);box.addEventListener('touchstart',md,{passive:false});
  document.addEventListener('mousemove',mm);document.addEventListener('touchmove',mm,{passive:false});
  document.addEventListener('mouseup',mu);document.addEventListener('touchend',mu);
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDetail();});
init();
